<div data-template="app:active-tab">
    <div class="users-page">
        <header class="page-header">
            <h1>Users &amp; Groups</h1>
            <p>Create, edit, and remove users and groups.</p>
        </header>

        <div class="tab-group">
            <button type="button" class="tab-btn active" data-tab="users-list">Users</button>
            <button type="button" class="tab-btn" data-tab="groups-list">Groups</button>
        </div>

        <!-- Users panel -->
        <div class="tab-panel active" id="panel-users-list">
            <div class="toolbar">
                <input type="text" id="user-filter" placeholder="Filter users..." class="filter-input"/>
                <button type="button" id="create-user-btn" class="btn btn-primary">Create User</button>
            </div>
            <table class="data-table">
                <thead>
                    <tr><th>Username</th><th>Groups</th><th>Enabled</th><th></th></tr>
                </thead>
                <tbody id="users-body">
                    <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Groups panel -->
        <div class="tab-panel" id="panel-groups-list">
            <div class="toolbar">
                <input type="text" id="group-filter" placeholder="Filter groups..." class="filter-input"/>
                <button type="button" id="create-group-btn" class="btn btn-primary">Create Group</button>
            </div>
            <table class="data-table">
                <thead>
                    <tr><th>Group</th><th>Members</th><th>Managers</th><th></th></tr>
                </thead>
                <tbody id="groups-body">
                    <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Create/Edit User dialog -->
        <div id="user-dialog" class="dialog-overlay" hidden="">
            <div class="dialog">
                <h2 id="user-dialog-title">Create User</h2>
                <input type="hidden" id="user-edit-mode" value="create"/>
                <div class="form-field">
                    <label for="user-name">Username</label>
                    <input type="text" id="user-name" autocomplete="off"/>
                </div>
                <div class="form-field">
                    <label for="user-password">Password</label>
                    <input type="password" id="user-password" autocomplete="new-password"/>
                </div>
                <div class="form-field">
                    <label>Groups <span class="form-hint">(first checked is primary)</span></label>
                    <div id="user-groups-list" class="checkbox-list"/>
                    <div class="form-row">
                        <input type="text" id="user-new-group" placeholder="New group name..."/>
                        <button type="button" id="user-add-group" class="btn btn-sm">Add</button>
                    </div>
                </div>
                <div class="dialog-actions">
                    <button type="button" id="user-save" class="btn btn-primary">Save</button>
                    <button type="button" id="user-cancel" class="btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Create Group dialog -->
        <div id="group-dialog" class="dialog-overlay" hidden="">
            <div class="dialog">
                <h2>Create Group</h2>
                <div class="form-field">
                    <label for="group-name">Group Name</label>
                    <input type="text" id="group-name"/>
                </div>
                <div class="dialog-actions">
                    <button type="button" id="group-save" class="btn btn-primary">Create</button>
                    <button type="button" id="group-cancel" class="btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="resources/js/users.js"></script>
</div>
