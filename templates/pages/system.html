<div data-template="app:active-tab">
    <div class="system-page">
        <header class="page-header">
            <h1>System</h1>
            <p>Detailed system information, Java properties, and configuration.</p>
        </header>

        <h2 class="section-heading">System Status</h2>
        <div data-template="app:system-status"/>

        <div id="system-content">
            <div class="info-grid">
                <div class="monitor-section">
                    <h2>Database</h2>
                    <table class="info-table" id="sys-db">
                        <tbody></tbody>
                    </table>
                </div>

                <div class="monitor-section">
                    <h2>Java</h2>
                    <table class="info-table" id="sys-java">
                        <tbody></tbody>
                    </table>
                </div>

                <div class="monitor-section">
                    <h2>Operating System</h2>
                    <table class="info-table" id="sys-os">
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="monitor-section">
                <h2>Scheduled Jobs</h2>
                <table class="data-table" id="sys-jobs">
                    <thead>
                        <tr><th>Name</th><th>Group</th><th>State</th><th>Schedule</th></tr>
                    </thead>
                    <tbody id="jobs-body">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="resources/js/system.js"></script>
</div>
